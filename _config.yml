# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: philenius
logo_emphasis: phil
description: Blog about scalable cloud setups, ML life-cycle tooling, and modern app stacks.
meta_description: >-
  Hi there! I'm Phil - a software engineer who lives and breathes Python. After finishing my studies in machine learning, I've spent
  the last few years building production-grade ML pipelines, experimenting with deep learning models for computer vision, and
  architecting scalable cloud-native solutions.
long_description: >-
  Hi there! I'm Phil - a software engineer who lives and breathes Python. After finishing my studies in machine learning, I've spent
  the last few years building production-grade ML pipelines, experimenting with deep learning models for computer vision, and
  architecting scalable cloud-native solutions.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://philenius.github.io" # the base hostname & protocol for your site, e.g. http://example.com
#twitter_username:
author_github: philenius
author_avatar: assets/images/avatar.jpg

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-archives
  - jekyll-feed
  - jekyll-minifier
  - jekyll-sitemap
  - jemoji
timezone: Europe/Berlin

google_analytics: UA-80928743-3
jekyll-minifier:
  uglifier_args:
    harmony: true
# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

jekyll-archives:
  enabled:
    - categories
  layouts:
    category: category
  permalinks:
    category: '/:name/'
